<input type="email" name="email" placeholder="E-posta" required style="width:100%;padding:10px;margin:6px 0;">
<input type="text" name="sehir" placeholder="Şehir" required style="width:100%;padding:10px;margin:6px 0;">
<select name="brans" required style="width:100%;padding:10px;margin:6px 0;">
<option value="">Branş Seçiniz</option>

<!-- ÖĞRENCİ - RESMİ BURS FORMU (İstediğin gibi düzenlendi) -->
<div id="ogrenci" class="tab-content" style="display:none; padding:20px; background:white; border-radius:10px;">
<form action="https://formspree.io/f/mgvglwbz" method="POST" onsubmit="sendForm(event)" enctype="multipart/form-data">

    <h2 style="color:#006d77; text-align:center; margin-bottom:20px;">Öğrenci Burs Başvuru Formu</h2>
    
    <input type="text" name="adsoyad" placeholder="Ad Soyad *" required style="width:100%;padding:10px;margin:8px 0;">
    <input type="tel" name="telefon" placeholder="Telefon Numarası *" required style="width:100%;padding:10px;margin:8px 0;">
    <input type="email" name="email" placeholder="E-posta Adresi *" required style="width:100%;padding:10px;margin:8px 0;">
    
    <input type="text" name="tc" placeholder="TC Kimlik No" style="width:100%;padding:10px;margin:8px 0;">
    <input type="text" name="okul" placeholder="Okul / Üniversite Adı *" required style="width:100%;padding:10px;margin:8px 0;">
    <input type="text" name="bolum" placeholder="Bölüm / Sınıf *" required style="width:100%;padding:10px;margin:8px 0;">
    
    <select name="sinif" required style="width:100%;padding:10px;margin:8px 0;">
        <option value="">Sınıf / Dönem Seçiniz *</option>
        <option>Hazırlık</option>
        <option>1. Sınıf</option>
        <option>2. Sınıf</option>
        <option>3. Sınıf</option>
        <option>4. Sınıf</option>
        <option>Lisansüstü</option>
    </select>

    <!-- Burs Talebi Kontrolü -->
    <div style="margin:15px 0;">
        <label style="display:block; margin-bottom:8px; font-weight:bold;">
            <input type="checkbox" id="bursIstiyorum" onchange="bursToggle(this)" style="margin-right:8px;"> 
            Burs Talebinde Bulunmak İstiyorum
        </label>
    </div>

    <!-- Burs Alanları (Başlangıçta gizli) -->
    <div id="bursAlani" style="display:none; background:#f8f9fa; padding:15px; border-radius:8px; margin:15px 0; border:1px solid #ddd;">
        <h3 style="color:#006d77; margin-top:0;">Burs Bilgileri</h3>
        
        <select name="burs_turu" style="width:100%;padding:10px;margin:8px 0;">
            <option value="">Burs Türü Seçiniz</option>
            <option>Eğitim Bursu</option>
            <option>Başarı Bursu</option>
            <option>Sosyal Yardım Bursu</option>
            <option>Diğer</option>
        </select>
        
        <input type="number" name="burs_miktar" placeholder="Talep Edilen Aylık Burs Miktarı (₺)" style="width:100%;padding:10px;margin:8px 0;">
        
        <textarea name="burs_neden" placeholder="Burs talep nedeninizi detaylı olarak açıklayınız (aile durumu, maddi zorluklar, akademik başarı vb.) *" 
                  style="width:100%;padding:10px;margin:8px 0;height:110px;" required></textarea>
    </div>

    <!-- Dosya Yükleme -->
    <div style="margin:15px 0;">
        <label style="display:block; margin-bottom:8px; font-weight:bold;">Gerekli Belgeler (Opsiyonel ama önerilir)</label>
        <input type="file" name="dosya" style="width:100%;padding:8px;margin:8px 0; background:white; border:1px solid #ccc; border-radius:6px;">
        <small style="color:#666;">Öğrenci belgesi, gelir durumunu gösteren belge, transkript vb. yükleyebilirsiniz.</small>
    </div>

    <!-- Küçük Mesaj Kutusu -->
    <textarea name="mesaj" placeholder="Eklemek istediğiniz diğer bilgiler veya notlar..." 
              style="width:100%;padding:10px;margin:12px 0;height:90px;"></textarea>

    <button type="submit" style="width:100%;padding:14px;background:#2ecc71;color:white;font-size:16px;font-weight:bold;border:none;border-radius:8px;cursor:pointer;">
        Başvurumu Gönder
    </button>
</form>
</div>

<!-- GÖNÜLLÜ -->
<div id="gonullu" class="tab-content" style="display:none; padding:20px; background:white; border-radius:10px;">
<form action="https://formspree.io/f/mgvglwbz" method="POST" onsubmit="sendForm(event)">
<input type="text" name="adsoyad" placeholder="Ad Soyad" required style="width:100%;padding:10px;margin:6px 0;">
<input type="tel" name="telefon" placeholder="Telefon" required style="width:100%;padding:10px;margin:6px 0;">
<input type="email" name="email" placeholder="E-posta" required style="width:100%;padding:10px;margin:6px 0;">
<input type="text" name="meslek" placeholder="Meslek / Unvan" required style="width:100%;padding:10px;margin:6px 0;">
<select name="ilgi" required style="width:100%;padding:10px;margin:6px 0;">
<option value="">İlgi Alanı Seçiniz</option>
<option>Eğitim</option><option>Sosyal Yardım</option>
<option>Çevre</option><option>Kültür ve Sanat</option><option>Diğer</option>
</select>
<textarea name="mesaj" placeholder="Kendinizi tanıtın ve neden üye olmak istediğinizi yazınız..." style="width:100%;padding:10px;margin:6px 0;height:110px;"></textarea>
<button type="submit" style="width:100%;padding:12px;background:#9b59b6;color:white;">Başvuruyu Gönder</button>
</form>
</div>

<!-- DESTEK -->
<div id="destek" class="tab-content" style="display:none; padding:20px; background:white; border-radius:10px;">
<form action="https://formspree.io/f/mgvglwbz" method="POST" onsubmit="sendForm(event)">
<input type="text" name="adsoyad" placeholder="Ad Soyad" required style="width:100%;padding:10px;margin:6px 0;">
<input type="email" name="email" placeholder="E-posta" required style="width:100%;padding:10px;margin:6px 0;">
<select name="destek_turu" onchange="destekSecildi(this.value)" required style="width:100%;padding:10px;margin:6px 0;">
<option value="">Destek Türü Seçiniz</option>
<option>Finansal Destek</option>
<option>Burs Desteği</option>
<option>Malzeme Desteği</option>
<option>Gönüllülük Desteği</option>
</select>
<div id="bursAlan" style="display:none; margin-top:10px;">
<input type="text" value="TR00 0000 0000 0000 0000 0000 00" readonly style="width:100%;padding:10px;margin:6px 0; background:#e0f7fa;">
<input type="number" name="tutar" placeholder="Bağış Tutarı (₺)" style="width:100%;padding:10px;margin:6px 0;">
</div>
<textarea name="mesaj" placeholder="Eklemek istedikleriniz veya notlar..." style="width:100%;padding:10px;margin:6px 0;height:100px;"></textarea>
<button type="submit" style="width:100%;padding:12px;background:#e67e22;color:white;">Gönder</button>
</form>
</div>

<script>
function openTab(tabName){
    document.querySelectorAll('.tab-content').forEach(t => t.style.display = "none");
    document.getElementById(tabName).style.display = "block";
}

function sendForm(e){
    e.preventDefault();
    const form = e.target;
    fetch(form.action, {
        method: "POST",
        body: new FormData(form),
        headers: {'Accept': 'application/json'}
    }).then(r => {
        if(r.ok){
            document.getElementById("successMessage").style.display = "block";
            form.reset();
            document.getElementById("bursAlani").style.display = "none";
            document.getElementById("bursAlan").style.display = "none";
        }
    }).catch(err => console.error(err));
}

// Burs talebi checkbox kontrolü
function bursToggle(checkbox) {
    const bursAlani = document.getElementById("bursAlani");
    if (checkbox.checked) {
        bursAlani.style.display = "block";
        // Burs nedeni alanını required yap
        document.querySelector('textarea[name="burs_neden"]').required = true;
    } else {
        bursAlani.style.display = "none";
        document.querySelector('textarea[name="burs_neden"]').required = false;
    }
}

function destekSecildi(val){
    document.getElementById("bursAlan").style.display = 
        (val === "Burs Desteği") ? "block" : "none";
}
</script>

</div>
