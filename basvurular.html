 <div style="font-family:Arial, sans-serif; max-width:800px; margin:0 auto; padding:20px; background:#f0f8ff; border-radius:12px; box-shadow:0 0 15px rgba(0,0,0,0.1);">
  
  <h1 style="text-align:center; color:#006d77;">Bize Katıl</h1>
  <p style="text-align:center; color:#555;">Aşağıdan ilgini çeken alanı seçerek başvuru yapabilirsiniz.</p>

  <!-- ✅ BAŞARI MESAJI -->
  <div id="successMessage" style="
  display:none;
  background:#00c853;
  color:white;
  padding:12px;
  border-radius:8px;
  text-align:center;
  margin-bottom:15px;
  font-weight:600;
  animation:fadeIn 0.5s;">
  ✅ Mesajınız başarıyla iletilmiştir.
  </div>

  <!-- Sekme Menüsü -->
  <div style="display:flex; justify-content:center; margin-bottom:20px; gap:10px; flex-wrap:wrap;">
    <button onclick="openTab('ogretmen')" class="tab-btn active">Gönüllü Öğretmen</button>
    <button onclick="openTab('ogrenci')" class="tab-btn">Öğrenci Üye</button>
    <button onclick="openTab('gonullu')" class="tab-btn">Gönüllü Üye</button>
    <button onclick="openTab('destek')" class="tab-btn">Destek Ol</button>
  </div>

  <!-- FORM 1 -->
  <div id="ogretmen" class="tab-content" style="display:block; padding:20px; background:white; border-radius:10px;">
    <h2 style="color:#006d77; text-align:center;">Gönüllü Öğretmen Başvuru</h2>
    <form action="https://formspree.io/f/mgvglwbz" method="POST" onsubmit="showMessage(event)">
      <input type="text" name="adsoyad" placeholder="Ad Soyad" required style="width:100%; padding:10px; margin:8px 0;">
      <input type="tel" name="telefon" placeholder="Telefon" required style="width:100%; padding:10px; margin:8px 0;">
      <input type="email" name="email" placeholder="E-posta" required style="width:100%; padding:10px; margin:8px 0;">
      <input type="text" name="sehir" placeholder="Şehir / İl" required style="width:100%; padding:10px; margin:8px 0;">
      <button type="submit" style="background:#006d77; color:white; padding:12px; width:100%;">Gönder</button>
    </form>
  </div>

  <!-- FORM 2 -->
  <div id="ogrenci" class="tab-content" style="display:none; padding:20px; background:white; border-radius:10px;">
    <h2 style="color:#006d77; text-align:center;">Öğrenci Üye Ol</h2>
    <form action="https://formspree.io/f/mgvglwbz" method="POST" onsubmit="showMessage(event)">
      <input type="text" name="adsoyad" placeholder="Ad Soyad" required style="width:100%; padding:10px; margin:8px 0;">
      <input type="email" name="email" placeholder="E-posta" required style="width:100%; padding:10px; margin:8px 0;">
      <button type="submit" style="background:#006d77; color:white; padding:12px; width:100%;">Gönder</button>
    </form>
  </div>

  <!-- FORM 3 -->
  <div id="gonullu" class="tab-content" style="display:none; padding:20px; background:white; border-radius:10px;">
    <h2 style="color:#006d77; text-align:center;">Gönüllü Üye Ol</h2>
    <form action="https://formspree.io/f/mgvglwbz" method="POST" onsubmit="showMessage(event)">
      <input type="text" name="adsoyad" placeholder="Ad Soyad" required style="width:100%; padding:10px; margin:8px 0;">
      <input type="email" name="email" placeholder="E-posta" required style="width:100%; padding:10px; margin:8px 0;">
      <button type="submit" style="background:#006d77; color:white; padding:12px; width:100%;">Üye Ol</button>
    </form>
  </div>

  <!-- FORM 4 -->
  <div id="destek" class="tab-content" style="display:none; padding:20px; background:white; border-radius:10px;">
    <h2 style="color:#006d77; text-align:center;">Destek Ol</h2>
    <form action="https://formspree.io/f/mgvglwbz" method="POST" onsubmit="showMessage(event)">
      <input type="text" name="adsoyad" placeholder="Ad Soyad" required style="width:100%; padding:10px; margin:8px 0;">
      <input type="email" name="email" placeholder="E-posta" required style="width:100%; padding:10px; margin:8px 0;">
      <button type="submit" style="background:#006d77; color:white; padding:12px; width:100%;">Gönder</button>
    </form>
  </div>

  <!-- JS -->
  <script>
    function openTab(tabName) {
      const tabs = document.getElementsByClassName("tab-content");
      for (let i = 0; i < tabs.length; i++) {
        tabs[i].style.display = "none";
      }
      document.getElementById(tabName).style.display = "block";

      const buttons = document.getElementsByClassName("tab-btn");
      for (let i = 0; i < buttons.length; i++) {
        buttons[i].classList.remove("active");
      }
      event.currentTarget.classList.add("active");
    }

    function showMessage(e){
      e.preventDefault();
      const form = e.target;

      fetch(form.action, {
        method: "POST",
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      }).then(response => {
        if(response.ok){
          document.getElementById("successMessage").style.display = "block";
          form.reset();
        }
      });
    }
  </script>

  <style>
    .tab-btn {
      padding:10px 16px;
      background:#e0e0e0;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }
    .tab-btn.active { background:#006d77; color:white; }

    @keyframes fadeIn {
      from {opacity:0; transform:translateY(-10px);}
      to {opacity:1;}
    }
  </style>

</div>
