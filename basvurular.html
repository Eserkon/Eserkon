<div id="ogrenci" class="tab-content" style="display:none; padding:20px; background:white; border-radius:10px; box-shadow:0 0 8px rgba(0,0,0,0.05);">
  <h2 style="color:#006d77; text-align:center;">Öğrenci Üye Ol</h2>
  <form action="https://formspree.io/f/mgvglwbz" method="POST">
    <input type="hidden" name="form_type" value="öğrenci">

    <!-- Temel Bilgiler -->
    <input type="text" name="adsoyad" placeholder="Ad Soyad" required style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px;">
    <input type="tel" name="telefon" placeholder="Telefon" required style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px;">
    <input type="email" name="email" placeholder="E-posta" required style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px;">

    <select name="okul_turu" required style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px;">
      <option value="">Okul Türü</option>
      <option>İlkokul</option>
      <option>Ortaokul</option>
      <option>Lise</option>
      <option>Meslek Lisesi</option>
      <option>Üniversite</option>
    </select>

    <input type="text" name="okul" placeholder="Okulunuz" required style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px;">
    <input type="text" name="bolum" placeholder="Bölümünüz" required style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px;">

    <!-- Burs İsteği -->
    <div style="margin:17px 0; font-size:17px;">
      <label>
        <input type="checkbox" id="bursIste" style="margin-right:8px;"> 
        <strong>Burs almayı düşünüyor musunuz?</strong>
      </label>
    </div>

    <!-- Burs Formu (Gizli başlar) -->
    <div id="bursForm" style="display:none; margin-top:20px; padding:15px; background:#f8f9fa; border:1px dashed #006d77; border-radius:8px;">
      <h3 style="color:#006d77; margin-top:0;">Burs Başvuru Bilgileri</h3>

      <select name="okul_turu" style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px;">
        <option value="">Okuduğunuz Eğitim Düzeyi</option>
        <option>İlkokul</option>
        <option>Ortaokul</option>
        <option>Lise</option>
        <option>Ön Lisans</option>
        <option>Lisans</option>
        <option>Yüksek Lisans</option>
      </select>

      <select name="engel_durum" style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px;">
        <option value="">Engelli bir durumunuz var mı?</option>
        <option>Yok</option>
        <option>Var (Lütfen açıklama kısmına yazınız)</option>
      </select>

      <select name="aylik_gelir" style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px;">
        <option value="">Aylık Hane Geliri</option>
        <option>0 - 10.000 TL</option>
        <option>10.001 - 20.000 TL</option>
        <option>20.001 - 35.000 TL</option>
        <option>35.001 TL ve üzeri</option>
        <option>Bilinmiyor</option>
      </select>

      <select name="calisiyor_mu" style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px;">
        <option value="">Şu anda ek bir iş yapıyor musunuz?</option>
        <option>Evet</option>
        <option>Hayır</option>
      </select>

      <select name="diger_burs" style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px;">
        <option value="">Başka kurumdan burs alıyor musunuz?</option>
        <option>Yok</option>
        <option>Devlet (KYK vb.)</option>
        <option>Vakıf/STK</option>
        <option>Özel Kurum</option>
      </select>

      <select name="anne_durum" style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px;">
        <option value="">Anne Hayatta mı?</option>
        <option>Evet</option>
        <option>Hayır</option>
        <option>Bilinmiyor</option>
      </select>

      <select name="baba_durum" style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px;">
        <option value="">Baba Hayatta mı?</option>
        <option>Evet</option>
        <option>Hayır</option>
        <option>Bilinmiyor</option>
      </select>

      <input type="text" name="acil_kisi" placeholder="Acil Durumda Ulaşılacak Kişi" style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px;">
      <input type="tel" name="acil_telefon" placeholder="Acil Kişi Telefonu" style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px;">

      <textarea name="aciklama" placeholder="Eklemek istediğiniz bir durum varsa (rapor, belge, açıklama)" style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px; height:60px;"></textarea>

      <div style="margin:10px 0; font-size:14px; color:#555;">
        <label>
          <input type="checkbox" name="belge_gonder" value="1"> 
          ön başvurum olumlu sonuçlanırsa Gerekli belgeleri (e-devlet gelir belgesi, rapor, kimlik) e-posta ile göndermek istiyorum.
        </label>
      </div>
    </div>

    <!-- Gönder Butonu -->
    <button type="submit" style="background:#006d77; color:white; padding:12px 20px; border:none; border-radius:4px; cursor:pointer; width:100%; font-size:16px;">Üye Ol ve Başvur</button>
  </form>
</div>

<script>
  document.getElementById("bursIste")?.addEventListener("change", function() {
    document.getElementById("bursForm").style.display = this.checked ? "block" : "none";
  });
</script>
