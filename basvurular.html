<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bize Katıl - ESERKON</title>

<style>
body {font-family:Arial; background:#f0f8ff;}
.container {max-width:850px;margin:auto;padding:20px;background:white;border-radius:12px;}

.tab-content{display:none;}
.tab-btn{
padding:10px 15px;border:none;border-radius:8px;color:white;cursor:pointer;
}

input,select,textarea{
width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:4px;
}

button{
padding:12px;border:none;border-radius:8px;color:white;font-weight:bold;
}

.payment-section{
background:#f8f9fa;padding:15px;border-radius:8px;margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1 style="text-align:center;color:#006d77;">Bize Katıl</h1>

<!-- BUTON -->
<div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
<button class="tab-btn" style="background:#00b4d8" onclick="openTab('ogretmen')">Öğretmen</button>
<button class="tab-btn" style="background:#2ecc71" onclick="openTab('ogrenci')">Öğrenci</button>
<button class="tab-btn" style="background:#9b59b6" onclick="openTab('gonullu')">Üye</button>
<button class="tab-btn" style="background:#e67e22" onclick="openTab('destek')">Destek</button>
</div>

<!-- ================= ÖĞRETMEN ================= -->
<div id="ogretmen" class="tab-content" style="display:block;">
<form action="https://formspree.io/f/xpqowknj" method="POST" onsubmit="sendForm(event)">
<h2>Gönüllü Öğretmen</h2>

<input type="text" name="adsoyad" placeholder="Ad Soyad" required>
<input type="tel" name="telefon" placeholder="Telefon" required>
<input type="email" name="email" placeholder="E-posta" required>

<select name="brans" required>
<option value="">Branş</option>
<option>Matematik</option>
<option>Türkçe</option>
<option>İngilizce</option>
</select>

<textarea name="mesaj" placeholder="Kendinizi tanıtın"></textarea>

<button style="background:#00b4d8">Gönder</button>
</form>
</div>

<!-- ================= ÖĞRENCİ ================= -->
<div id="ogrenci" class="tab-content">
<form action="https://formspree.io/f/xpqowknj" method="POST" id="ogrenciForm" onsubmit="sendForm(event)">
<h2>Öğrenci Üye Ol</h2>

<input type="text" name="adsoyad" placeholder="Ad Soyad" required>
<input type="text" name="tc" placeholder="TC Kimlik" required maxlength="11">
<input type="date" name="dogum">

<select name="cinsiyet">
<option value="">Cinsiyet</option>
<option>Erkek</option>
<option>Kadın</option>
</select>

<input type="tel" name="telefon" placeholder="Telefon" required>
<input type="email" name="email" placeholder="E-posta" required>

<select name="okul_turu" required>
<option value="">Okul Türü</option>
<option>Lise</option>
<option>Üniversite</option>
</select>

<input type="text" name="okul" placeholder="Okul">
<input type="text" name="sinif" placeholder="Sınıf">

<label><input type="checkbox" id="bursCheck"> Burs almak istiyorum</label>

<div id="bursForm" style="display:none;">
<h3>Burs Bilgileri</h3>

<select name="gelir">
<option value="">Gelir</option>
<option>0-5000</option>
<option>5000-10000</option>
<option>10000+</option>
</select>

<select name="anne">
<option value="">Anne</option>
<option>Sağ</option>
<option>Vefat</option>
</select>

<select name="baba">
<option value="">Baba</option>
<option>Sağ</option>
<option>Vefat</option>
</select>

<textarea name="aciklama"></textarea>
</div>

<button style="background:#2ecc71">Gönder</button>
</form>
</div>

<!-- ================= GÖNÜLLÜ ================= -->
<div id="gonullu" class="tab-content">
<form action="https://formspree.io/f/xpqowknj" method="POST" onsubmit="sendForm(event)">
<h2>Üye Ol</h2>

<input type="text" name="adsoyad" placeholder="Ad Soyad">
<input type="tel" name="telefon" placeholder="Telefon">
<input type="email" name="email" placeholder="E-posta">

<textarea name="mesaj"></textarea>

<button style="background:#9b59b6">Gönder</button>
</form>
</div>

<!-- ================= DESTEK ================= -->
<div id="destek" class="tab-content">
<form action="https://formspree.io/f/xpqowknj" method="POST" onsubmit="sendForm(event)">

<h2>Destek Ol</h2>

<input type="text" name="adsoyad" placeholder="Ad Soyad" required>
<input type="email" name="email" placeholder="E-posta" required>

<select id="destekTuru" onchange="destekSecildi(this.value)">
<option value="">Destek Türü</option>
<option value="burs">Burs Vermek</option>
<option value="diger">Diğer</option>
</select>

<div id="odemeAlani" style="display:none;">

<input type="number" name="miktar" placeholder="Miktar">

<select onchange="odemeSec(this.value)">
<option value="">Ödeme</option>
<option value="iban">IBAN</option>
<option value="eft">EFT</option>
<option value="kart">Kredi Kartı</option>
<option value="nakit">Nakit</option>
</select>

<div id="iban" class="payment-section" style="display:none;">
IBAN: BURAYA EKLE
</div>

<div id="eft" class="payment-section" style="display:none;">
Banka Havale
</div>

<div id="nakit" class="payment-section" style="display:none;">
Elden ödeme
</div>

<div id="kart" class="payment-section" style="display:none;">
<input type="text" placeholder="Kart Adı">
<input type="text" id="kartNo" placeholder="Kart No">
<input type="text" placeholder="AA/YY">
<input type="text" placeholder="CVV">
</div>

</div>

<button style="background:#e67e22">Gönder</button>
</form>
</div>

</div>

<script>

// TAB
function openTab(tab){
document.querySelectorAll(".tab-content").forEach(t=>t.style.display="none");
document.getElementById(tab).style.display="block";
}

// FORM GÖNDER
function sendForm(e){
e.preventDefault();
fetch(e.target.action,{
method:"POST",
body:new FormData(e.target),
headers:{'Accept':'application/json'}
}).then(()=>{
alert("Gönderildi");
e.target.reset();
resetAll();
});
}

// RESET
function resetAll(){
document.getElementById("bursForm").style.display="none";
document.getElementById("odemeAlani").style.display="none";
["iban","eft","nakit","kart"].forEach(id=>{
let el=document.getElementById(id);
if(el) el.style.display="none";
});
}

// BURS
document.getElementById("bursCheck").addEventListener("change",function(){
document.getElementById("bursForm").style.display=this.checked?"block":"none";
});

// DESTEK
function destekSecildi(val){
document.getElementById("odemeAlani").style.display = val==="burs"?"block":"none";
}

// ÖDEME
function odemeSec(val){
["iban","eft","nakit","kart"].forEach(id=>{
document.getElementById(id).style.display="none";
});
if(val) document.getElementById(val).style.display="block";
}

// KART FORMAT
document.addEventListener("input",function(e){
if(e.target.id==="kartNo"){
let v=e.target.value.replace(/\D/g,'').match(/.{1,4}/g);
e.target.value=v?v.join(" "):"";
}
});

</script>

</body>
</html>
