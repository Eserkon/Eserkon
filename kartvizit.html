<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESERKON | Mustafa Yılmaz</title>
  <style>
    :root {
      --bg: #0f1724;
      --card: #0b1220;
      --accent: #0a66d1;
      --muted: #9aa4b2;
      --glow1: #2dd4bf;
      --glow2: #60a5fa;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(180deg, #061026, #081225);
      color: #e6eef6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 780px;
      background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0.008));
      border-radius: 24px;
      box-shadow: 0 25px 70px rgba(0,0,0,0.75);
      padding: 32px 28px;
      position: relative;
      overflow: visible;
      border: 1px solid rgba(255,255,255,0.04);
    }
    .logo-wrap {
      text-align: center;
      margin: 20px 0;
    }
    .logo {
      width: 100px;
      height: 100px;
      border-radius: 20px;
      object-fit: cover;
    }
    .title {
      text-align: center;
      margin-bottom: 20px;
    }
    .org {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
    }
    .role {
      font-size: 16px;
      color: var(--muted);
    }
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 20px;
    }
    .col {
      flex: 1 1 300px;
    }
    .link-box {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      transition: all 0.2s;
    }
    .link-box:hover {
      background: rgba(255,255,255,0.06);
      transform: translateY(-2px);
    }
    .badge {
      width: 46px;
      height: 46px;
      border-radius: 10px;
      background: #1e40af;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .badge img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .meta {
      font-size: 15px;
      line-height: 1.4;
    }
    .muted {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      display: block;
    }
    .actions {
      text-align: center;
      margin-top: 30px;
    }
    .btn {
      padding: 12px 20px;
      border-radius: 12px;
      background: linear-gradient(90deg, #10b981, #059669);
      color: #021226;
      font-weight: 800;
      border: none;
      cursor: pointer;
      margin: 0 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="eserkon-logo.png" alt="ESERKON" class="logo">
    </div>
    <div class="title">
      <div class="org">ESERKON</div>
      <div class="role">Kurucu & Başkan Mustafa Yılmaz</div>
    </div>

    <div class="grid">
      <div class="col">
        <div class="link-box">
          <div class="badge"><img src="eserkon-logo.png" alt="logo"></div>
          <div class="meta"><span class="muted">WhatsApp</span><a href="https://wa.me/905435871765" style="color:#e6eef6;text-decoration:none;">+90 543 587 17 65</a></div>
        </div>
        <div class="link-box">
          <div class="badge"><img src="eserkon-logo.png" alt="logo"></div>
          <div class="meta"><span class="muted">E-Mail</span><a href="mailto:gonulselkisi@gmail.com" style="color:#e6eef6;text-decoration:none;">gonulselkisi@gmail.com</a></div>
        </div>
      </div>
      <div class="col">
        <div class="link-box">
          <div class="badge"><img src="eserkon-logo.png" alt="logo"></div>
          <div class="meta"><span class="muted">Web</span><a href="https://www.eserkon.com.tr" style="color:#e6eef6;text-decoration:none;">www.eserkon.com.tr</a></div>
        </div>
        <div class="link-box">
          <div class="badge"><img src="eserkon-logo.png" alt="logo"></div>
          <div class="meta"><span class="muted">Adres</span><span>Ankara, Türkiye</span></div>
        </div>
      </div>
    </div>

    <div class="actions">
      <a class="btn" href="mustafayilmaz.vcf" download>Rehbere Kaydet</a>
    </div>
  </div>
</body>
</html>
