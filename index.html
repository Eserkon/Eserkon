 <!DOCTYPE html> 
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ESERKON Dijital Kartvizit</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: #0d1b2a;
  color: white;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px;
}

.big-logo {
  max-width: 240px;
  margin-bottom: 30px;
}

/* Yazı animasyonu */
@keyframes heartbeat {
  0% { transform: scale(1); text-shadow: 0 0 15px #00ffff; }
  50% { transform: scale(1.18); text-shadow: 0 0 40px #00c6ff; }
  100% { transform: scale(1); text-shadow: 0 0 15px #00ffff; }
}

.hero-text h1 {
  font-size: 5rem;
  animation: heartbeat 1.5s infinite;
}

.hero-text p {
  font-size: 1.6rem;
  animation: heartbeat 2.5s infinite;
}

/* QR ALANI */
.qr-section {
  text-align: center;
  margin-top: 40px;
}

.qr-box {
  display: inline-block;
  background: white;
  padding: 20px;
  border-radius: 20px;
  position: relative;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* ORTA LOGO */
.qr-logo {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 75px;
  height: 75px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: white;
  padding: 5px;
}

/* ALT YAZI */
.qr-title {
  margin-top: 20px;
  font-size: 22px;
  color: #00eaff;
  animation: heartbeat 2s infinite;
}
</style>
</head>

<body>

<div class="hero">
  <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgEuqMyi9iTUz8Mtp8GN85InHVgANQHOXEAQhjhZHJsilqa9FrWXikcX1pAa7Xi2nQfFDblyewwpkRGiWTxlKOmXWJluZwqaPy5yRodC2AXEuvp5XwV5qLDbhAFJifc7ntFnD8WJ-IkFTfPFrWkZzPV7yiYVyL-HIsr-NVnKpnocHvknEixxC0UhSkMw5BX/s320/TRANSPARAN%20LOGO.png" class="big-logo">

  <div class="hero-text">
    <h1>ESERKON</h1>
    <p>EĞİTİM • SOSYAL ETKİNLİK • REHBERLİK</p>
  </div>
</div>

<!-- QR KOD -->
<div class="qr-section">

  <div class="qr-box">
    <div id="qrcode"></div>

    <!-- LOGO (SENİN LOGON) -->
    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgEuqMyi9iTUz8Mtp8GN85InHVgANQHOXEAQhjhZHJsilqa9FrWXikcX1pAa7Xi2nQfFDblyewwpkRGiWTxlKOmXWJluZwqaPy5yRodC2AXEuvp5XwV5qLDbhAFJifc7ntFnD8WJ-IkFTfPFrWkZzPV7yiYVyL-HIsr-NVnKpnocHvknEixxC0UhSkMw5BX/s320/TRANSPARAN%20LOGO.png" class="qr-logo">
  </div>

  <div class="qr-title">QR Kodu Tara – Kartvizite Ulaş</div>

</div>

<!-- QR SCRIPT -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
new QRCode(document.getElementById("qrcode"), {
  text: "https://www.eserkon.com.tr/",
  width: 260,
  height: 260
});
</script>

</body>
</html>
