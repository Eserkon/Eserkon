<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ESERKON Katılım Formları</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      background: #0d1b2a;
      color: white;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
    }

    .hero img.big-logo {
      max-width: 240px;
      margin-bottom: 30px;
    }

    .hero-text h1 {
      font-size: 3rem;
    }

    .hero-text p {
      font-size: 1.3rem;
    }

    .qr-container {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      margin: 40px;
    }

    .qr-box {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }

    .qr-box img {
      width: 200px;
    }
  </style>
</head>

<body>

<div class="hero">
  <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgEuqMyi9iTUz8Mtp8GN85InHVgANQHOXEAQhjhZHJsilqa9FrWXikcX1pAa7Xi2nQfFDblyewwpkRGiWTxlKOmXWJluZwqaPy5yRodC2AXEuvp5XwV5qLDbhAFJifc7ntFnD8WJ-IkFTfPFrWkZzPV7yiYVyL-HIsr-NVnKpnocHvknEixxC0UhSkMw5BX/s320/TRANSPARAN%20LOGO.png"
       class="big-logo">

  <div class="hero-text">
    <h1>ESERKON</h1>
    <p>EĞİTİM SOSYAL ETKİNLİK VE REHBERLİK KONSEYİ</p>
  </div>
</div>

<div class="qr-container">
  <div class="qr-box">
    <p>Dijital Kartvizit</p>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://www.eserkon.com.tr/">
  </div>

  <div class="qr-box">
    <p>İletişim</p>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://www.eserkon.com.tr/bizeulasin">
  </div>
</div>

<!-- SES KODU -->
<audio id="myAudio" preload="auto">
  <source src="assets/kadin-sesi.mp3" type="audio/mpeg">
</audio>

<script>
  let played = false;

  document.addEventListener('click', function () {
    if (!played) {
      const audio = document.getElementById('myAudio');
      audio.play()
        .then(() => { played = true; })
        .catch(e => console.log("Ses hatası:", e));
    }
  });
</script>

</body>
</html>
