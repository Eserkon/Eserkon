 <!DOCTYPE html> 
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ESERKON Dijital Kartvizit</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: #0d1b2a;
  color: white;
  text-align: center;
}

/* HERO */
.hero {
  padding: 60px 20px;
}

.big-logo {
  max-width: 200px;
  margin-bottom: 20px;
}

/* ESERKON YAZI */
.logo-text {
  font-size: 5rem;
  font-weight: 700;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
}

/* LOGO O HARFİ */
.inline-logo {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  animation: pulseLogo 1.5s infinite;
}

/* Neon + kalp atışı */
@keyframes glowPulse {
  0% { transform: scale(1); text-shadow: 0 0 15px #00ffff; }
  50% { transform: scale(1.15); text-shadow: 0 0 40px #00c6ff, 0 0 80px #00ffff; }
  100% { transform: scale(1); text-shadow: 0 0 15px #00ffff; }
}

@keyframes pulseLogo {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

.logo-text span {
  animation: glowPulse 1.5s infinite;
}

/* Alt yazı */
.slogan {
  font-size: 1.5rem;
  margin-top: 20px;
  animation: glowPulse 2.5s infinite;
}

/* QR */
.qr-box {
  margin-top: 40px;
  display: inline-block;
  background: white;
  padding: 20px;
  border-radius: 20px;
  position: relative;
}

/* QR ORTA LOGO */
.qr-logo {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 70px;
  height: 70px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: white;
  padding: 5px;
}
</style>
</head>

<body>

<div class="hero">

  <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgEuqMyi9iTUz8Mtp8GN85InHVgANQHOXEAQhjhZHJsilqa9FrWXikcX1pAa7Xi2nQfFDblyewwpkRGiWTxlKOmXWJluZwqaPy5yRodC2AXEuvp5XwV5qLDbhAFJifc7ntFnD8WJ-IkFTfPFrWkZzPV7yiYVyL-HIsr-NVnKpnocHvknEixxC0UhSkMw5BX/s320/TRANSPARAN%20LOGO.png" class="big-logo">

  <!-- ESERKON -->
  <div class="logo-text">
    <span>E</span>
    <span>S</span>
    <span>E</span>
    <span>R</span>
    <span>K</span>

    <!-- O yerine LOGO -->
    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgEuqMyi9iTUz8Mtp8GN85InHVgANQHOXEAQhjhZHJsilqa9FrWXikcX1pAa7Xi2nQfFDblyewwpkRGiWTxlKOmXWJluZwqaPy5yRodC2AXEuvp5XwV5qLDbhAFJifc7ntFnD8WJ-IkFTfPFrWkZzPV7yiYVyL-HIsr-NVnKpnocHvknEixxC0UhSkMw5BX/s320/TRANSPARAN%20LOGO.png" class="inline-logo">

    <span>N</span>
  </div>

  <div class="slogan">
    EĞİTİM • SOSYAL ETKİNLİK • REHBERLİK
  </div>

  <!-- QR -->
  <div class="qr-box">
    <div id="qrcode"></div>

    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgEuqMyi9iTUz8Mtp8GN85InHVgANQHOXEAQhjhZHJsilqa9FrWXikcX1pAa7Xi2nQfFDblyewwpkRGiWTxlKOmXWJluZwqaPy5yRodC2AXEuvp5XwV5qLDbhAFJifc7ntFnD8WJ-IkFTfPFrWkZzPV7yiYVyL-HIsr-NVnKpnocHvknEixxC0UhSkMw5BX/s320/TRANSPARAN%20LOGO.png" class="qr-logo">
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
new QRCode(document.getElementById("qrcode"), {
  text: "https://www.eserkon.com.tr/",
  width: 260,
  height: 260
});
</script>

</body>
</html>
